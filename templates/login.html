<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EPL Match Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/png" href="logo/EPLPRE.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --card:     #1a2235;
      --border:   #2a3a55;
      --accent:   #38bdf8;
      --green:    #22c55e;
      --yellow:   #facc15;
      --red:      #f87171;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(56,189,248,0.12);
      border: 1px solid rgba(56,189,248,0.25);
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 14px;
    }

    .logo-container {
      margin-bottom: 20px;
    }
    .logo-container img {
      max-width: 80px;
      height: auto;
      animation: fadeInDown 0.6s ease;
    }
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(4px);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .error-box.show {
      display: block;
    }

    .success-box {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #22c55e;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .success-box.show {
      display: block;
    }

    .footer-text {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 24px;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-text a:hover {
      color: #0ea5e9;
    }

    .loading {
      display: none;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(56,189,248,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <img src="logo/EPLPRE.png" alt="EPL Predictor Logo" />
      </div>
      <div class="badge">⚽ Secure Access</div>
      <h1>EPL Match Predictor</h1>
      <p>Get instant match predictions with AI</p>
    </header>

    <div class="auth-card">
      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="your@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="loading" id="loading">
            <span class="spinner"></span>
          </span>
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <div class="footer-text">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const btnText = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.classList.remove('show');
      errorBox.textContent = '';
      successBox.classList.remove('show');
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      submitBtn.disabled = true;
      loading.style.display = 'inline';
      btnText.textContent = 'Signing in...';

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          successBox.textContent = 'Login successful! Redirecting...';
          successBox.classList.add('show');
          setTimeout(() => {
            window.location.href = data.redirect || '/';
          }, 500);
        } else {
          showError(data.error || 'Login failed');
        }
      } catch (error) {
        showError('Network error: ' + error.message);
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
        btnText.textContent = 'Sign In';
      }
    });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
    }
  </script>
</body>
</html>
